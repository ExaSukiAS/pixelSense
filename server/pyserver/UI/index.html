<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pixelSense</title>

            </div>
            <div class = "statusPill" id = "serverStatusPill">
                <span>Server</span>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M300-720q-25 0-42.5 17.5T240-660q0 25 17.5 42.5T300-600q25 0 42.5-17.5T360-660q0-25-17.5-42.5T300-720Zm0 400q-25 0-42.5 17.5T240-260q0 25 17.5 42.5T300-200q25 0 42.5-17.5T360-260q0-25-17.5-42.5T300-320ZM160-840h640q17 0 28.5 11.5T840-800v280q0 17-11.5 28.5T800-480H160q-17 0-28.5-11.5T120-520v-280q0-17 11.5-28.5T160-840Zm40 80v200h560v-200H200Zm-40 320h640q17 0 28.5 11.5T840-400v280q0 17-11.5 28.5T800-80H160q-17 0-28.5-11.5T120-120v-280q0-17 11.5-28.5T160-440Zm40 80v200h560v-200H200Zm0-400v200-200Zm0 400v200-200Z"/></svg>
            </div>
        </div>
        <div class = "taskLoader">
            <span id = "taskPercentageSpan">50%</span>
            <div class = "levelOuter">
                <div class = "levelInner" id = "levelInnerDiv"></div>
            </div>
        </div>
        <div class = "buttons">
            <button id = "terminateButton"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M320-320h320v-320H320v320ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>Terminate</button>
            <button id = "streamButton"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M371-200h218l-20-80H391l-20 80Zm-11-160h240q83 0 141.5-58.5T800-560q0-83-58.5-141.5T600-760H360q-83 0-141.5 58.5T160-560q0 83 58.5 141.5T360-360Zm63.5-143.5Q400-527 400-560t23.5-56.5Q447-640 480-640t56.5 23.5Q560-593 560-560t-23.5 56.5Q513-480 480-480t-56.5-23.5ZM260-600q17 0 28.5-11.5T300-640q0-17-11.5-28.5T260-680q-17 0-28.5 11.5T220-640q0 17 11.5 28.5T260-600ZM160-120v-80h129l21-84q-99-17-164.5-94.5T80-560q0-117 81.5-198.5T360-840h240q117 0 198.5 81.5T880-560q0 104-65.5 181.5T650-284l21 84h129v80H160Zm433-327q47-47 47-113t-47-113q-47-47-113-47t-113 47q-47 47-47 113t47 113q47 47 113 47t113-47ZM480-560ZM371-200h218-218Z"/></svg>Start Stream</button>
            <button id = "enableAudioButton"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M280-240v-480h80v480h-80ZM440-80v-800h80v800h-80ZM120-400v-160h80v160h-80Zm480 160v-480h80v480h-80Zm160-160v-160h80v160h-80Z"/></svg>Audio</button>
        </div>
    </div>
    <div class = "mainBody">
        <div class = "verticalGroup">
            <div class = "imageContainer">
                <img id = "cameraImage">
            </div>
            <dv class = "systemLog">
                <span id = "systemLogSpan"></span>
            </dv>
        </div>
        <div class = "buttonGrid">
            <button id = "txt_rec">Text Recognition</button>
            <button id = "obj_dtc">Object Detection</button>
            <button id = "img_des">Image Description</button>
            <button id = "freeform">Freeform</button>
            <button id = "coord">Coordination</button>
            <button id = "ai_chat">AI chat</button>
        </div>
    </div>
</body>
<script src = "voice.js" type="module"></script>

</html>
